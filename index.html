<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copilot Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0e14;
      --surface:    #13161f;
      --surface2:   #1a1e2b;
      --border:     #252a3a;
      --accent:     #4f8ef7;
      --accent2:    #7b5cf0;
      --text:       #e2e6f0;
      --text-muted: #6b7394;
      --green:      #3dd68c;
      --red:        #f76f6f;
      --radius:     14px;
      --mono:       'DM Mono', monospace;
      --sans:       'Sora', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      max-width: 880px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-ring {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header span {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-left: auto;
    }

    /* RESPONSE AREA */
    .response-area {
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      gap: 16px;
      overflow-y: auto;
    }

    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      user-select: none;
      animation: fadeIn 0.6s ease both;
    }

    .placeholder-icon {
      font-size: 2.8rem;
      opacity: 0.35;
    }

    .placeholder p { font-size: 0.88rem; }

    /* Response card */
    .response-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: slideUp 0.3s ease both;
    }

    .response-card.error {
      border-color: var(--red);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-label.ok { color: var(--green); }
    .card-label.err { color: var(--red); }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(79,142,247,0.07);
    }

    .copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(61,214,140,0.07);
    }

    .card-body {
      padding: 18px 20px;
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 55vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Prompt echo */
    .prompt-echo {
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 6px 4px;
      border-left: 2px solid var(--border);
      padding-left: 12px;
      font-family: var(--mono);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* SPINNER */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 48px 0;
      animation: fadeIn 0.3s ease both;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .spinner-label {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* INPUT BAR */
    .input-bar {
      padding: 18px 0 28px;
      border-top: 1px solid var(--border);
    }

    .debug-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .debug-toggle-wrap input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
      width: 14px;
      height: 14px;
    }

    .debug-toggle-wrap label {
      cursor: pointer;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }

    #prompt-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #prompt-input::placeholder { color: var(--text-muted); }

    #send-btn {
      align-self: flex-end;
      width: 42px; height: 42px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.18s, transform 0.15s;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .hint {
      margin-top: 8px;
      font-size: 0.73rem;
      color: var(--text-muted);
      font-family: var(--mono);
      padding-left: 4px;
    }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="logo-ring">🤖</div>
    <h1>Copilot Interface</h1>
    <span>m365.cloud.microsoft</span>
  </header>

  <div class="response-area" id="response-area">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">✦</div>
      <p>Send a prompt to get started.<br/>Responses appear here and are fully selectable.</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="debug-toggle-wrap">
      <input type="checkbox" id="debugToggle">
      <label for="debugToggle">Show browser window (Debug Mode)</label>
    </div>
    <div class="input-wrap">
      <textarea
        id="prompt-input"
        placeholder="Ask Copilot anything…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="hint">↵ Enter to send &nbsp;·&nbsp; Shift+↵ new line &nbsp;·&nbsp; All response text is selectable</p>
  </div>

</div>

<script>
  const promptInput = document.getElementById('prompt-input');
  const sendBtn     = document.getElementById('send-btn');
  const responseArea = document.getElementById('response-area');
  const placeholder  = document.getElementById('placeholder');
  const debugToggle  = document.getElementById('debugToggle');

  // Auto-grow textarea
  promptInput.addEventListener('input', () => {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 180) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  sendBtn.addEventListener('click', sendPrompt);

  async function sendPrompt() {
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    // Capture debug toggle state
    const isDebug = debugToggle.checked;

    // Hide placeholder
    if (placeholder) placeholder.style.display = 'none';

    // Show spinner
    const spinner = document.createElement('div');
    spinner.className = 'spinner-wrap';
    spinner.innerHTML = `
      <div class="spinner"></div>
      <div class="spinner-label">Waiting for Copilot…</div>
    `;
    responseArea.appendChild(spinner);
    responseArea.scrollTop = responseArea.scrollHeight;

    // Lock UI
    sendBtn.disabled = true;
    promptInput.disabled = true;

    const promptSnapshot = prompt;
    promptInput.value = '';
    promptInput.style.height = 'auto';

    try {
      const res = await fetch('/api/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: promptSnapshot, debug: isDebug })
      });

      const data = await res.json();
      spinner.remove();

      const isError = !!data.error;
      const text = data.error || data.response;

      renderResponse(promptSnapshot, text, isError);
    } catch (err) {
      spinner.remove();
      renderResponse(promptSnapshot, 'Network error: could not reach the server.', true);
    } finally {
      sendBtn.disabled = false;
      promptInput.disabled = false;
      promptInput.focus();
    }
  }

  function renderResponse(prompt, text, isError) {
    const card = document.createElement('div');
    card.className = 'response-card' + (isError ? ' error' : '');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-label ${isError ? 'err' : 'ok'}">${isError ? '⚠ Error' : '✔ Response'}</span>
        <button class="copy-btn" title="Copy response">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy
        </button>
      </div>
      <div class="prompt-echo">${escHtml(prompt)}</div>
      <div class="card-body">${escHtml(text)}</div>
    `;

    // Copy button logic
    const copyBtn = card.querySelector('.copy-btn');
    const body    = card.querySelector('.card-body');
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(body.innerText).then(() => {
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Copied!
        `;
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy
          `;
        }, 2200);
      });
    });

    responseArea.appendChild(card);
    responseArea.scrollTop = responseArea.scrollHeight;
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
